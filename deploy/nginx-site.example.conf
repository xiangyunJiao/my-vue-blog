# 复制到 /etc/nginx/sites-available/ 后按需改名，再 ln -s 到 sites-enabled
# 替换：your-domain.com、root 路径、ssl_certificate 路径（HTTPS 时）
#
# 前置：Node 后端监听 127.0.0.1:3000（与 backend/.env 的 PORT 一致）
# 前置：前端已 npm run build，root 指向前端 dist 目录

server {
    listen 80;
    server_name your-domain.com;

    # 前端静态资源（Vue 构建产物）
    root /var/www/my-vue-blog/frontend/dist;
    index index.html;

    # SPA：除真实文件外一律回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 与上传文件由 Nginx 反代到本机 Node
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/my-vue-blog.access.log;
    error_log  /var/log/nginx/my-vue-blog.error.log;
}

